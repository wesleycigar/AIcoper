<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用AI · AIcoper</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .scroll{padding:0 0 100px}
  .chat-scroll{overflow-y:auto;padding:14px}
  .msg-row{display:flex;gap:10px;margin-bottom:16px;align-items:flex-start}
  .msg-row.user{flex-direction:row-reverse}
  .msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
  .msg-avatar.user-av{background:var(--brand);color:#fff}
  .msg-avatar.ai-av{background:var(--brand-lt);color:var(--brand-dk);font-size:16px}
  .msg-bubble{max-width:78%;padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
  .msg-bubble.user-bb{background:var(--brand);color:#fff;border-bottom-right-radius:4px}
  .msg-bubble.ai-bb{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg-label{font-size:11px;font-weight:600;margin-bottom:4px;opacity:.7}
  .user-bb .msg-label{color:rgba(255,255,255,.8)}

  /* 多列模型回复 */
  .multi-col{display:grid;gap:10px;margin-bottom:16px}
  .multi-col.cols-2{grid-template-columns:1fr 1fr}
  .multi-col.cols-3{grid-template-columns:1fr 1fr 1fr}
  .multi-col.cols-4{grid-template-columns:1fr 1fr}
  .multi-col.cols-6{grid-template-columns:1fr 1fr 1fr}
  .multi-col .model-reply{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .multi-col .model-reply .mr-header{padding:8px 12px;font-size:11px;font-weight:700;border-bottom:1px solid var(--line)}
  .multi-col .model-reply .mr-body{padding:10px 12px;font-size:13px;line-height:1.55;min-height:40px}
  .mr-header.ds{background:#E8F0FE;color:#1A56DB}
  .mr-header.qwen{background:#F3E8FF;color:#6B21A8}
  .mr-header.doubao{background:#E8F5E8;color:#2E5A2E}
  .mr-header.kimi{background:#FFF0E5;color:#B85C2A}
  .mr-header.glm{background:#FCE4EC;color:#B71C1C}
  .mr-header.claude{background:#FFF3E0;color:#E65100}
  .mr-header.gpt{background:#E3F2FD;color:#0D47A1}

  /* 模型选择器 */
  .model-bar{position:sticky;top:56px;z-index:8;background:var(--bg);padding:8px 14px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .model-chip{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--card);white-space:nowrap;transition:.15s}
  .model-chip.on{border-color:var(--brand);background:var(--brand-lt);color:var(--brand-dk)}
  .model-chip.add{border-style:dashed;color:var(--muted)}
  .model-chip .del{display:none;margin-left:4px;color:var(--danger);cursor:pointer}
  .model-chip.custom .del{display:inline}

  /* 底部输入 */
  .chat-input{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:var(--maxw);background:var(--card);border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;z-index:20}
  .chat-input textarea{flex:1;border:1.5px solid var(--line);border-radius:16px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5}
  .chat-input textarea:focus{border-color:var(--brand)}
  .chat-input button{width:42px;height:42px;border-radius:50%;border:0;background:var(--brand);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center}
  .chat-input button:active{background:var(--brand-dk)}
  .chat-input button:disabled{background:var(--line);cursor:default}

  .count-badge{font-size:11px;color:var(--muted);white-space:nowrap}

  @media(min-width:768px){
    .chat-input{max-width:1100px;padding:12px 24px}
    .chat-input textarea{font-size:15px}
    .model-bar{top:56px;padding:10px 24px}
    .chat-scroll{padding:14px 24px}
    .multi-col.cols-4{grid-template-columns:1fr 1fr}
    .multi-col.cols-6{grid-template-columns:1fr 1fr 1fr}
  }
</style>
</head>
<body>
<div class="phone">

  <div class="topbar">
    <a href="index.html" class="back">‹</a>
    <span class="logo">💬 用 AI</span>
    <span class="sub" id="modelCount">未选模型</span>
  </div>

  <!-- 模型选择器 -->
  <div class="model-bar" id="modelBar">
    <span class="model-chip on" data-model="deepseek" onclick="toggleModel(this)">DeepSeek ✅</span>
    <span class="model-chip on" data-model="qwen" onclick="toggleModel(this)">通义千问 ✅</span>
    <span class="model-chip" data-model="glm" onclick="toggleModel(this)">智谱GLM ✅</span>
    <span class="model-chip" data-model="kimi" onclick="toggleModel(this)" style="opacity:.5">Kimi ⚠️</span>
    <span class="model-chip" data-model="doubao" onclick="toggleModel(this)" style="opacity:.35">豆包 🔒</span>
    <span class="model-chip add" onclick="addCustomModel()">+ 自定义</span>
    <span class="count-badge" id="selCount">已选 3 个</span>
  </div>

  <div class="scroll">
    <div class="chat-scroll" id="chatArea">

      <!-- 后端状态 -->
      <div id="backendStatus" style="text-align:center;padding:8px;font-size:12px;margin-bottom:4px">
        <span style="color:var(--muted)">🔗 检测后端…</span>
      </div>

      <!-- 空状态 -->
      <div id="emptyState" style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">💬</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">三个模型已就绪，开始对话</div>
        <div class="small muted">
          已选：DeepSeek + 通义千问 + GLM<br>
          输入问题后 Enter 发送
        </div>
      </div>

    </div>

    <div class="compliance" style="padding-bottom:40px">模型调用基于API聚合 · 回复质量取决于各模型实际表现</div>
  </div>

  <!-- 底部输入 -->
  <div class="chat-input">
    <textarea id="userInput" rows="1" placeholder="输入你的问题… (Enter发送，Shift+Enter换行)" onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">→</button>
  </div>

  <nav class="tabbar">
    <a href="index.html"><span class="ic">🏠</span>首页</a>
    <a href="aggregate.html" class="on"><span class="ic">💬</span>用AI</a>
    <a href="advocate.html"><span class="ic">⚔️</span>对抗</a>
    <a href="diverge.html"><span class="ic">🔀</span>发散</a>
    <a href="eval.html"><span class="ic">📊</span>评测</a>
    <a href="collaborate.html"><span class="ic">🤝</span>共建</a>
  </nav>

</div>

<script>
var activeModels = ['deepseek','qwen','glm'];
var customModels = [];

var modelNames = {
  deepseek:'DeepSeek ✅',qwen:'通义千问 ✅',doubao:'豆包 🔒',kimi:'Kimi ⚠️',
  glm:'智谱GLM ✅'
};
var headerClasses = {
  deepseek:'ds',qwen:'qwen',doubao:'doubao',kimi:'kimi',glm:'glm'
};

var demoReplies = {
  deepseek:'⚠️ 后端未启动。请在终端执行：\ncd backend && bash start.sh\n\n启动后刷新本页面即可获得真实回复。',
  qwen:'⚠️ 后端未启动。\n运行命令：cd backend && bash start.sh',
  glm:'⚠️ 后端未启动。\n运行命令：cd backend && bash start.sh',
  kimi:'Kimi API 限流中，稍后可用。',
  doubao:'豆包需要在火山引擎控制台创建推理接入点(Endpoint)。'
};

var API_BASE = 'https://acdbentity-evanescence-untitled-manhattan.trycloudflare.com';
var backendOnline = false;

// 检测后端状态
(async function checkBackend(){
  var st = document.getElementById('backendStatus');
  try {
    var r = await fetch(API_BASE+'/api/health');
    if(r.ok){
      backendOnline = true;
      st.innerHTML = '<span style="color:var(--success);font-weight:600">🟢 后端在线 — DeepSeek + 通义千问 + GLM 可用</span>';
    }
  } catch(e){
    backendOnline = false;
    st.innerHTML = '<span style="color:var(--danger);font-weight:600">🔴 后端未启动</span> <span style="color:var(--muted)">— 请在终端运行：cd backend && bash start.sh</span>';
  }
})();

function toggleModel(el){
  var m = el.dataset.model;
  if(el.classList.contains('on')){
    el.classList.remove('on');
    activeModels = activeModels.filter(function(x){return x!==m});
  }else{
    el.classList.add('on');
    if(activeModels.indexOf(m)===-1) activeModels.push(m);
  }
  updateCount();
}

function addCustomModel(){
  var name = prompt('输入自定义模型名称（如：元宝混元）');
  if(!name) return;
  var id = 'custom_'+Date.now();
  customModels.push({id:id,name:name});
  modelNames[id] = name;
  headerClasses[id] = 'glm';
  demoReplies[id] = name+'：自定义模型已添加。（当前为演示模式，接入API后将返回真实回复）';

  var chip = document.createElement('span');
  chip.className = 'model-chip on custom';
  chip.dataset.model = id;
  chip.innerHTML = name + '<span class="del" onclick="event.stopPropagation();removeCustom(\''+id+'\',this.parentElement)">×</span>';
  chip.onclick = function(){toggleModel(chip)};
  document.querySelector('.model-chip.add').before(chip);

  activeModels.push(id);
  updateCount();
}

function removeCustom(id,el){
  activeModels = activeModels.filter(function(x){return x!==id});
  customModels = customModels.filter(function(x){return x.id!==id});
  el.remove();
  updateCount();
}

function updateCount(){
  var n = activeModels.length;
  document.getElementById('modelCount').textContent = n ? '已选 '+n+' 个模型' : '未选模型';
  document.getElementById('selCount').textContent = '已选 '+n+' 个';
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function sendMessage(){
  var inp = document.getElementById('userInput');
  var text = inp.value.trim();
  if(!text || activeModels.length===0) return;
  inp.value = '';
  inp.style.height = 'auto';

  var area = document.getElementById('chatArea');
  var empty = document.getElementById('emptyState');
  if(empty) empty.style.display = 'none';

  // 用户消息
  var userRow = document.createElement('div');
  userRow.className = 'msg-row user';
  userRow.innerHTML = '<div class="msg-avatar user-av">我</div><div class="msg-bubble user-bb">'+escHtml(text)+'</div>';
  area.appendChild(userRow);

  // 多模型回复
  var cols = activeModels.length <= 3 ? activeModels.length : (activeModels.length <= 4 ? 2 : 3);
  var multi = document.createElement('div');
  multi.className = 'multi-col cols-'+cols;

  activeModels.forEach(function(m){
    var card = document.createElement('div');
    card.className = 'model-reply';
    card.innerHTML = '<div class="mr-header '+headerClasses[m]+'">'+modelNames[m]+'</div>'+
      '<div class="mr-body">⏳ 正在生成…</div>';
    multi.appendChild(card);
  });
  area.appendChild(multi);
  area.scrollTop = area.scrollHeight;

  // 真实API调用
  callBackend(text, activeModels, multi, area);
}

async function callBackend(message, models, multiEl, area){
  if(!backendOnline){
    var bodies = multiEl.querySelectorAll('.mr-body');
    models.forEach(function(m,i){
      if(bodies[i]) bodies[i].textContent = demoReplies[m] || '⚠️ 后端未启动，请在终端运行：cd backend && bash start.sh';
    });
    area.scrollTop = area.scrollHeight;
    return;
  }
  try {
    var resp = await fetch(API_BASE+'/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:message, models:models})
    });
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    var data = await resp.json();
    var bodies = multiEl.querySelectorAll('.mr-body');
    data.results.forEach(function(r,i){
      if(bodies[i]){
        bodies[i].textContent = r.error ? '⚠️ '+r.content : r.content;
      }
    });
  } catch(e) {
    var bodies = multiEl.querySelectorAll('.mr-body');
    models.forEach(function(m,i){
      if(bodies[i]) bodies[i].textContent = '❌ 调用失败: '+e.message+'\n\n请确认后端已启动：cd backend && bash start.sh';
    });
  }
  area.scrollTop = area.scrollHeight;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 自适应textarea高度
document.getElementById('userInput').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';
});

updateCount();
</script>
</body>
</html>
